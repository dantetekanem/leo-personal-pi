# Enable mouse support, including wheel scrolling
set -g mouse on

# Enable modified key reporting for terminals that support it
set -g extended-keys on

# Allow image protocols / advanced terminal escapes through tmux
set -gq allow-passthrough on
set -g visual-activity off

# Dynamic terminal/window titles for Ghostty
set -g set-titles on
set -g set-titles-string '#S · #W'

# Close tmux sessions when their last Ghostty/terminal tab closes
set -g destroy-unattached on

# Keep tmux window names useful as commands change
setw -g automatic-rename on
setw -g automatic-rename-format '#{pane_current_command}'

set -g extended-keys-format csi-u
